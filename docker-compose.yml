      - PYTHONPATH=/app
      - ENV=docker
      - PARALLEL_PROCESSES=auto
      - PYTEST_TAGS="smoke or critical"
      - REPORT_DIR=reports
      - RERUN_NB=1
      - RERUN_DELAY=2
    build:
      context: ./digitalbank-automation
      dockerfile: Dockerfile
