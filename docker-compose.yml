      - BROWSER=firefox
      - VIEWPORT=desktop
      - PYTHONPATH=/app
      - ENV=docker
      - PARALLEL_PROCESSES=auto
      - PYTEST_TAGS="regression or smoke or critical"
      - REPORT_DIR=reports
      - RERUN_NB=1
      - RERUN_DELAY=2
    build:
      context: ./digitalbank-automation
      dockerfile: Dockerfile
    container_name: digitalbank-tests-firefox-desktop
    depends_on:
      webapp:
        condition: service_healthy
