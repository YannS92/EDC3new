# Docker Compose - DigitalBank
# 2 conteneurs : Frontend (nginx) + Tests (Python/Chrome)

services:
  # ═══════════════════════════════════════════════════════════════
  # FRONTEND - Application DigitalBank
  # ═══════════════════════════════════════════════════════════════
  webapp:
    image: nginx:alpine
    container_name: digitalbank-app
    volumes:
      - ./digitalbank:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - digitalbank-net

  # ═══════════════════════════════════════════════════════════════
  # TESTS - Chromium in Desktop Mode
  # ═══════════════════════════════════════════════════════════════
  tests-chromium-desktop:
    build:
      context: ./digitalbank-automation
      dockerfile: Dockerfile
    container_name: digitalbank-tests-chromium-desktop
    depends_on:
      webapp:
        condition: service_healthy
    environment:
      - BASE_URL=http://webapp/
      - PYTHONPATH=/app
    volumes:
      - ./digitalbank-automation/reports:/app/reports
      - ./digitalbank-automation/tests/data/db:/app/tests/data/db
    networks:
      - digitalbank-net
    command:
      [
        "tests/", "-v", "--headless",
        "-n", "auto",
        "--reruns", "1",
        "--reruns-delay", "2",
        "--env", "docker",
        "--browser", "chromium",
        "--viewport", "desktop",
        "--alluredir", "reports/allure-results",
        "--html", "reports/report-chromium-desktop.html",
        "--self-contained-html",
      ]

  # ═══════════════════════════════════════════════════════════════
  # TESTS - Chromium in Tablet Mode
  # ═══════════════════════════════════════════════════════════════
  tests-chromium-tablet:
    build:
      context: ./digitalbank-automation
      dockerfile: Dockerfile
    container_name: digitalbank-tests-chromium-tablet
    depends_on:
      webapp:
        condition: service_healthy
    environment:
      - BASE_URL=http://webapp/
      - PYTHONPATH=/app
    volumes:
      - ./digitalbank-automation/reports:/app/reports
      - ./digitalbank-automation/tests/data/db:/app/tests/data/db
    networks:
      - digitalbank-net
    command:
      [
        "tests/", "-v", "--headless",
        "-n", "auto",
        "--reruns", "1",
        "--reruns-delay", "2",
        "--env", "docker",
        "--viewport", "tablet",
        "--alluredir", "reports/allure-results",
        "--html", "reports/report-chromium-tablet.html",
        "--self-contained-html",
      ]

  # ═══════════════════════════════════════════════════════════════
  # TESTS - Chromium in Mobile Mode
  # ═══════════════════════════════════════════════════════════════
  tests-chromium-mobile:
    build:
      context: ./digitalbank-automation
      dockerfile: Dockerfile
    container_name: digitalbank-tests-chromium-mobile
    depends_on:
      webapp:
        condition: service_healthy
    environment:
      - BASE_URL=http://webapp/
      - PYTHONPATH=/app
    volumes:
      - ./digitalbank-automation/reports:/app/reports
      - ./digitalbank-automation/tests/data/db:/app/tests/data/db
    networks:
      - digitalbank-net
    command:
      [
        "tests/", "-v", "--headless",
        "-n", "auto",
        "--reruns", "1",
        "--reruns-delay", "2",
        "--env", "docker",
        "--viewport", "mobile",
        "--alluredir", "reports/allure-results",
        "--html", "reports/report-chromium-mobile.html",
        "--self-contained-html",
      ]

networks:
  digitalbank-net:
    driver: bridge
