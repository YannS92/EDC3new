# Docker Compose - DigitalBank
# 2 conteneurs : Frontend (nginx) + Tests (Python/Chrome)

services:
  # ═══════════════════════════════════════════════════════════════
  # FRONTEND - Application DigitalBank
  # ═══════════════════════════════════════════════════════════════
  webapp:
    image: nginx:alpine
    container_name: digitalbank-app
    volumes:
      - ./digitalbank:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - digitalbank-net

  # ═══════════════════════════════════════════════════════════════
  # TESTS - Python + Chrome Headless
  # ═══════════════════════════════════════════════════════════════
  tests:
    build:
      context: ./digitalbank-automation
      dockerfile: Dockerfile
    container_name: digitalbank-tests
    depends_on:
      webapp:
        condition: service_healthy
    environment:
      - BASE_URL=http://webapp/
      - PYTHONPATH=/app
    volumes:
      - ./digitalbank-automation/reports:/app/reports
      - ./digitalbank-automation/tests/data/db:/app/tests/data/db
    networks:
      - digitalbank-net
    command: ["tests/", "-v", "--headless", "-n", "auto", "--viewport=desktop", "--reruns", "1", "--reruns-delay", "2", "--alluredir=reports/allure-results", "--html=reports/report.html", "--self-contained-html"]

networks:
  digitalbank-net:
    driver: bridge
