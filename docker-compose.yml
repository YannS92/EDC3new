# Docker Compose - DigitalBank
# Frontend (nginx) + 9 conteneurs de tests (3 browsers x 3 viewports)
# Les variables d'environnement sont lues par entrypoint.sh au démarrage du conteneur

services:
  # ═══════════════════════════════════════════════════════════════
  # FRONTEND - Application DigitalBank
  # ═══════════════════════════════════════════════════════════════
  webapp:
    image: nginx:alpine
    container_name: digitalbank-app
    volumes:
      - ./digitalbank:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - digitalbank-net

  # ═══════════════════════════════════════════════════════════════
  # TESTS - Configurations des tests
  # ═══════════════════════════════════════════════════════════════
  tests-chromium-mobile:
    environment:
      - BROWSER=chromium
      - VIEWPORT=mobile
      - PYTHONPATH=/app
      - ENV=docker
      - PARALLEL_PROCESSES=auto
      - REPORT_DIR=reports
      - RERUN_NB=1
      - RERUN_DELAY=2
    build:
      context: ./digitalbank-automation
      dockerfile: Dockerfile
    container_name: digitalbank-tests-chromium-mobile
    depends_on:
      webapp:
        condition: service_healthy
    volumes:
      - ./digitalbank-automation/reports:/app/reports
    networks:
      - digitalbank-net

  tests-webkit-mobile:
    environment:
      - BROWSER=webkit
      - VIEWPORT=mobile
      - PYTHONPATH=/app
      - ENV=docker
      - PARALLEL_PROCESSES=auto
      - REPORT_DIR=reports
      - RERUN_NB=1
      - RERUN_DELAY=2
    build:
      context: ./digitalbank-automation
      dockerfile: Dockerfile
    container_name: digitalbank-tests-webkit-mobile
    depends_on:
      webapp:
        condition: service_healthy
    volumes:
      - ./digitalbank-automation/reports:/app/reports
    networks:
      - digitalbank-net

  tests-chromium-desktop:
    environment:
      - BROWSER=chromium
      - VIEWPORT=desktop
      - PYTHONPATH=/app
      - ENV=docker
      - PARALLEL_PROCESSES=auto
      - PYTEST_TAGS="regression or smoke or critical"
      - REPORT_DIR=reports
      - RERUN_NB=1
      - RERUN_DELAY=2
    build:
      context: ./digitalbank-automation
      dockerfile: Dockerfile
    container_name: digitalbank-tests-chromium-desktop
    depends_on:
      webapp:
        condition: service_healthy
    volumes:
      - ./digitalbank-automation/reports:/app/reports
    networks:
      - digitalbank-net

  tests-webkit-desktop:
    environment:
      - BROWSER=webkit
      - VIEWPORT=desktop
      - PYTHONPATH=/app
      - ENV=docker
      - PARALLEL_PROCESSES=auto
      - PYTEST_TAGS="regression or smoke or critical"
      - REPORT_DIR=reports
      - RERUN_NB=1
      - RERUN_DELAY=2
    build:
      context: ./digitalbank-automation
      dockerfile: Dockerfile
    container_name: digitalbank-tests-webkit-desktop
    depends_on:
