# Docker Compose - DigitalBank
# 2 conteneurs : Frontend (nginx) + Tests (Python/Chrome)

services:
  # ═══════════════════════════════════════════════════════════════
  # FRONTEND - Application DigitalBank
  # ═══════════════════════════════════════════════════════════════
  webapp:
    image: nginx:alpine
    container_name: digitalbank-app
    volumes:
      - ./digitalbank:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - digitalbank-net

  # ═══════════════════════════════════════════════════════════════
  # TESTS - Chromium in Desktop Mode
  # ═══════════════════════════════════════════════════════════════
  tests-chromium-desktop:
    environment:
      - BROWSER=chromium
      - VIEWPORT=desktop
      - PYTHONPATH=/app
      - ENV=docker
      - PARALLEL_PROCESSES=auto
      - REPORT_DIR=reports
      - RERUN_NB=1
      - RERUN_DELAY=2
    build:
      context: ./digitalbank-automation
      dockerfile: Dockerfile
    container_name: digitalbank-tests-chromium-desktop
    depends_on:
      webapp:
        condition: service_healthy
    volumes:
      - ./digitalbank-automation/reports:/app/reports
      - ./digitalbank-automation/tests/data/db:/app/tests/data/db
    networks:
      - digitalbank-net
    command:
      [
        "tests/", "-v", "--headless",
        "-n", "$PARALLEL_PROCESSES",
        "--reruns", "$RERUN_NB",
        "--reruns-delay", "$RERUN_DELAY",
        "--env", "$ENV",
        "--browser", "$BROWSER",
        "--viewport", "$VIEWPORT",
        "--alluredir", "$REPORT_DIR/allure-results",
        "--html", "$REPORT_DIR/report-$BROWSER-$VIEWPORT.html",
        "--self-contained-html",
      ]

  # ═══════════════════════════════════════════════════════════════
