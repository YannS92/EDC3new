# Docker Compose - DigitalBank
# ─────────────────────────────────────────────────────────────────────
# Architecture : 1 service webapp (nginx) + 9 conteneurs de tests
# Combinaisons : 3 navigateurs (chromium, firefox, webkit)
#              × 3 viewports  (mobile, tablet, desktop)
#
# Variables d'environnement clés (lues par le Dockerfile ENTRYPOINT) :
#   BROWSER            : navigateur Playwright (chromium | firefox | webkit)
#   VIEWPORT           : résolution cible (mobile | tablet | desktop)
#   ENV                : profil de configuration pytest (docker)
#   PARALLEL_PROCESSES : workers xdist (auto = nb de CPU)
#   PYTEST_MARKERS     : filtre pytest -m (smoke | regression | ...)
#                        Si vide → tous les tests sont exécutés
#   RERUN_NB           : nombre de relances sur échec (flaky tests)
#   RERUN_DELAY        : délai en secondes entre relances
#   REPORT_DIR         : dossier de sortie des rapports HTML + Allure
#
# Tous les services de tests partagent la même image digitalbank-tests
# construite depuis ./digitalbank-automation/Dockerfile.
# Les rapports sont montés dans ./digitalbank-automation/reports/.
# ─────────────────────────────────────────────────────────────────────

services:
  # ═══════════════════════════════════════════════════════════════
  # FRONTEND - Application DigitalBank
  # ═══════════════════════════════════════════════════════════════
  webapp:
    image: nginx:alpine
    container_name: digitalbank-app
    volumes:
      - ./digitalbank:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - digitalbank-net

  # ═══════════════════════════════════════════════════════════════
  # TESTS - Configurations des tests
  # ═══════════════════════════════════════════════════════════════
  tests-chromium-mobile:
    environment:
      - BROWSER=chromium
      - VIEWPORT=mobile
      - PYTHONPATH=/app
      - ENV=docker
      - PARALLEL_PROCESSES=auto
      - REPORT_DIR=reports
      - RERUN_NB=1
      - RERUN_DELAY=2
    image: digitalbank-tests:latest
    build:
      context: ./digitalbank-automation
      dockerfile: Dockerfile
    container_name: digitalbank-tests-chromium-mobile
    depends_on:
      webapp:
        condition: service_healthy
    volumes:
      - ./digitalbank-automation/reports:/app/reports
    networks:
      - digitalbank-net

  tests-webkit-tablet:
    environment:
      - BROWSER=webkit
      - VIEWPORT=tablet
      - PYTHONPATH=/app
      - ENV=docker
      - PARALLEL_PROCESSES=auto
      - REPORT_DIR=reports
      - RERUN_NB=1
      - RERUN_DELAY=2
    image: digitalbank-tests:latest
    container_name: digitalbank-tests-webkit-tablet
    depends_on:
      webapp:
        condition: service_healthy
    volumes:
      - ./digitalbank-automation/reports:/app/reports
    networks:
      - digitalbank-net

  tests-firefox-desktop:
    environment:
      - BROWSER=firefox
      - VIEWPORT=desktop
      - PYTHONPATH=/app
      - ENV=docker
      - PARALLEL_PROCESSES=auto
      - REPORT_DIR=reports
      - RERUN_NB=1
      - RERUN_DELAY=2
    image: digitalbank-tests:latest
    container_name: digitalbank-tests-firefox-desktop
    depends_on:
      webapp:
        condition: service_healthy
    volumes:
      - ./digitalbank-automation/reports:/app/reports
    networks:
      - digitalbank-net

  tests-chromium-desktop:
    environment:
      - BROWSER=chromium
      - VIEWPORT=desktop
      - PYTHONPATH=/app
      - ENV=docker
      - PARALLEL_PROCESSES=auto
      - PYTEST_MARKERS="regression or smoke or critical"
      - REPORT_DIR=reports
      - RERUN_NB=1
      - RERUN_DELAY=2
    image: digitalbank-tests:latest
    container_name: digitalbank-tests-chromium-desktop
    depends_on:
      webapp:
        condition: service_healthy
    volumes:
      - ./digitalbank-automation/reports:/app/reports
    networks:
      - digitalbank-net

  tests-webkit-mobile:
    environment:
      - BROWSER=webkit
      - VIEWPORT=mobile
      - PYTHONPATH=/app
      - ENV=docker
      - PARALLEL_PROCESSES=auto
      - PYTEST_MARKERS="regression or smoke or critical"
      - REPORT_DIR=reports
      - RERUN_NB=1
      - RERUN_DELAY=2
    image: digitalbank-tests:latest
    container_name: digitalbank-tests-webkit-mobile
    depends_on:
      webapp:
        condition: service_healthy
    volumes:
      - ./digitalbank-automation/reports:/app/reports
    networks:
      - digitalbank-net

  tests-chromium-tablet:
    environment:
      - BROWSER=chromium
      - VIEWPORT=tablet
      - PYTHONPATH=/app
      - ENV=docker
      - PARALLEL_PROCESSES=auto
      - PYTEST_MARKERS="smoke or critical"
      - REPORT_DIR=reports
      - RERUN_NB=1
      - RERUN_DELAY=2
    image: digitalbank-tests:latest
    container_name: digitalbank-tests-chromium-tablet
    depends_on:
      webapp:
        condition: service_healthy
    volumes:
      - ./digitalbank-automation/reports:/app/reports
    networks:
      - digitalbank-net

  tests-webkit-desktop:
    environment:
      - BROWSER=webkit
      - VIEWPORT=desktop
      - PYTHONPATH=/app
      - ENV=docker
      - PARALLEL_PROCESSES=auto
      - PYTEST_MARKERS="smoke or critical"
      - REPORT_DIR=reports
      - RERUN_NB=1
      - RERUN_DELAY=2
    image: digitalbank-tests:latest
    container_name: digitalbank-tests-webkit-desktop
    depends_on:
      webapp:
        condition: service_healthy
    volumes:
      - ./digitalbank-automation/reports:/app/reports
    networks:
      - digitalbank-net

  tests-firefox-mobile:
    environment:
      - BROWSER=firefox
      - VIEWPORT=mobile
      - PYTHONPATH=/app
      - ENV=docker
      - PARALLEL_PROCESSES=auto
      - PYTEST_MARKERS="smoke"
      - REPORT_DIR=reports
      - RERUN_NB=1
      - RERUN_DELAY=2
    image: digitalbank-tests:latest
    container_name: digitalbank-tests-firefox-mobile
    depends_on:
      webapp:
        condition: service_healthy
    volumes:
      - ./digitalbank-automation/reports:/app/reports
    networks:
      - digitalbank-net

  tests-firefox-tablet:
    environment:
      - BROWSER=firefox
      - VIEWPORT=tablet
      - PYTHONPATH=/app
      - ENV=docker
      - PARALLEL_PROCESSES=auto
      - PYTEST_MARKERS="smoke"
      - REPORT_DIR=reports
      - RERUN_NB=1
      - RERUN_DELAY=2
    image: digitalbank-tests:latest
    container_name: digitalbank-tests-firefox-tablet
    depends_on:
