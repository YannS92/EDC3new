name: DigitalBank - Tests Automatises

# ═══════════════════════════════════════════════════════════════════════
# Stratégie de dispatch par événement
# ───────────────────────────────────────────────────────────────────────
# Chaque job porte son propre filtre via `if: github.event_name == ...`
# ce qui élimine le besoin d'un job dispatcher séparé.
#
# ┌───────────────────┬─────────────────────────────────────────────────┐
# │ Événement         │ Jobs déclenchés                                 │
# ├───────────────────┼─────────────────────────────────────────────────┤
# │ push              │ tests-smoke (1 service aléatoire parmi les 3    │
# │ pull_request      │ configs principales, marqueur smoke)            │
# ├───────────────────┼─────────────────────────────────────────────────┤
# │ schedule          │ tests-regression (1 service aléatoire parmi les │
# │ (nightly)         │ 3 configs principales, marqueur regression)     │
# ├───────────────────┼─────────────────────────────────────────────────┤
# │ workflow_dispatch │ build → tests-production (matrix 9 services)    │
# │ (manuel)          │ → cleanup                                       │
# └───────────────────┴─────────────────────────────────────────────────┘
#
# CONTAINER_MAIN_SERVICES : pool des 3 services "représentatifs" utilisés
# pour smoke et regression (un par navigateur principal).
# tests-production couvre les 9 combinaisons browser × viewport.
# ═══════════════════════════════════════════════════════════════════════
permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Execution quotidienne a 00h00 heure de Paris (23h00 UTC la veille)
    - cron: '0 23 * * 1-5'
  workflow_dispatch:

defaults:
  run:
    shell: bash

env:
  CONTAINER_MAIN_SERVICES: tests-chromium-mobile tests-webkit-tablet tests-firefox-desktop

jobs:

  # ═══════════════════════════════════════════════
  # Build images
  # ═══════════════════════════════════════════════
  build:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker images in parallel
        run: docker compose build --parallel

      - name: Export image
        run: docker save digitalbank-tests > digitalbank-tests.tar

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: digitalbank-tests.tar
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════
  # Smoke tests — push / pull request
  # ═══════════════════════════════════════════════════════════════
  tests-smoke:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Select random main config
        id: random
        run: |
          SERVICES=($CONTAINER_MAIN_SERVICES)
          RANDOM_SERVICE=${SERVICES[$RANDOM % ${#SERVICES[@]}]}
          echo "service=$RANDOM_SERVICE" >> $GITHUB_OUTPUT
          echo "Selected service: $RANDOM_SERVICE"

      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build all Docker images in parallel
        run: docker compose build --parallel

      - name: Run Smoke Tests on ${{ steps.random.outputs.service }}
        id: run-tests
        run: |
          docker compose run -e PYTEST_MARKERS="smoke" ${{ steps.random.outputs.service }}
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "EXIT CODE $EXIT_CODE"
          exit $EXIT_CODE

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-tests-smoke
          path: digitalbank-automation/reports
          retention-days: 30

      - name: Stop containers
        if: always()
        run: docker compose down -v

      - name: Comment on Pull Request
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: append
          body: |
            ### Résultat des Smoke Tests
            - **Service testé :** `${{ steps.random.outputs.service }}`
            - **Statut :** ${{ steps.run-tests.outputs.exit_code == '0' && '✅ Succès' || '❌ Échec' }}
            - [Télécharger les rapports](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  # ═══════════════════════════════════════════════════════════════
  # Regression Tests — Daily
  # ═══════════════════════════════════════════════════════════════
  tests-regression:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Select random main config
        id: random
        run: |
          SERVICES=($CONTAINER_MAIN_SERVICES)
          RANDOM_SERVICE=${SERVICES[$RANDOM % ${#SERVICES[@]}]}
          echo "service=$RANDOM_SERVICE" >> $GITHUB_OUTPUT
          echo "Selected service: $RANDOM_SERVICE"

      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build all Docker images in parallel
        run: docker compose build --parallel

      - name: Run Regression Tests on ${{ steps.random.outputs.service }}
        id: run-tests
        run: |
          docker compose run -e PYTEST_MARKERS="regression" ${{ steps.random.outputs.service }}
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "EXIT CODE $EXIT_CODE"
          exit $EXIT_CODE

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-tests-regression
          path: digitalbank-automation/reports
          retention-days: 30

      - name: Stop containers
        if: always()
        run: docker compose down -v

      - name: Comment on Pull Request
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: append
          body: |
            ### Résultat des Regression Tests
            - **Service testé :** `${{ steps.random.outputs.service }}`
            - **Statut :** ${{ steps.run-tests.outputs.exit_code == '0' && '✅ Succès' || '❌ Échec' }}
            - [Télécharger les rapports](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  # ═══════════════════════════════════════════════════════════════
  # Complete Tests for Production-Ready Application — Manual
  # ═══════════════════════════════════════════════════════════════
  tests-production:
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        service:
          - tests-chromium-mobile
          - tests-firefox-desktop
          - tests-webkit-tablet
          - tests-chromium-desktop
          - tests-webkit-mobile
          - tests-webkit-desktop
          - tests-chromium-tablet
          - tests-firefox-mobile
          - tests-firefox-tablet

    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load < digitalbank-tests.tar

      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Run Tests on ${{ matrix.service }}
        id: run-tests
        run: |
          docker compose run ${{ matrix.service }}
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "EXIT CODE $EXIT_CODE"
          exit $EXIT_CODE

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.service }}
          path: digitalbank-automation/reports
          retention-days: 30

      - name: Stop containers
        if: always()
        run: docker compose down -v

      - name: Comment on Pull Request
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: append
          body: |
            ### Résultat des Production Tests
            - **Service testé :** `${{ matrix.service }}`
            - **Statut :** ${{ steps.run-tests.outputs.exit_code == '0' && '✅ Succès' || '❌ Échec' }}
            - [Télécharger les rapports](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  # ═══════════════════════════════════════════════════════════════
  # Cleanup
  # ═══════════════════════════════════════════════════════════════
  cleanup:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - tests-production
    steps:
      - name: Delete Docker image artifact
        uses: geekyeggo/delete-artifact@v5
        with:
          name: docker-image