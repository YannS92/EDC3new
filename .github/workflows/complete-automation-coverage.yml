name: DigitalBank - Tests Automatises

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Execution quotidienne a 00h00 heure de Paris (23h00 UTC la veille)
    - cron: '0 23 * * 0-4'
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Exécution des tests
  # ═══════════════════════════════════════════════════════════════
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build images Docker
        run: docker compose build --parallel

      - name: Run Tests
        run: docker compose up

      - name: Check exit codes
        if: always()
        run: |
          FAIL=0
          for SERVICE in $(docker compose config --services | grep tests-); do
            CID=$(docker compose ps -q $SERVICE)
            EXIT_CODE=$(docker inspect $CID --format='{{.State.ExitCode}}')
            echo "$SERVICE -> Exit code: $EXIT_CODE"

            if [ "$EXIT_CODE" != "0" ]; then
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tests-reports
          path: digitalbank-automation/reports
          retention-days: 30

      - name: Stop containers
        if: always()
        run: docker compose down -v

  # ═══════════════════════════════════════════════════════════════
  # Publication des résultats
  # ═══════════════════════════════════════════════════════════════
  publish-results:
    runs-on: ubuntu-latest
    needs: tests
    if: always()

    steps:
      - name: Publish PR summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ needs.tests.result }}';

            const icon = (s) =>
              s === 'success' ? '✅' :
              s === 'failure' ? '❌' : '⚠️';

            const body = `
            ## 📊 Résultats des Tests DigitalBank

            | Suite | Statut |
            |--------|--------|
            | Tests Globaux | ${icon(result)} ${result} |

            📁 Les rapports sont disponibles dans les **Artifacts** du workflow.

            🤖 _CI/CD DigitalBank_
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
