name: DigitalBank - Tests Automatises

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Execution quotidienne a 00h00 heure de Paris (23h00 UTC la veille)
    - cron: '0 23 * * 0-4'
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Exécution des tests
  # ═══════════════════════════════════════════════════════════════
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build images Docker
        run: docker compose build

      - name: Run Tests
        run: docker compose up --build

      - name: Stop containers
        if: always()
        run: docker compose down -v

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tests-reports
          path: digitalbank-automation/reports
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  # Publication des résultats
  # ═══════════════════════════════════════════════════════════════
  publish-results:
    runs-on: ubuntu-latest
    needs: tests
    if: always()

    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: Publier le resume sur la PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const testsResult = '${{ needs.tests.result }}';

            const statusIcon = (status) =>
              status === 'success' ? '✅' :
              status === 'failure' ? '❌' : '⚠️';

            const body = `## Résultats des Tests Automatisés

            | Suite | Statut |
            |-------|--------|
            | Tests Globaux | ${statusIcon(testsResult)} ${testsResult} |

            📊 Les rapports HTML sont disponibles dans les **Artifacts**.

            🤖 _Généré automatiquement par le pipeline CI/CD DigitalBank_`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
