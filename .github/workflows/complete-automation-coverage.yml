name: DigitalBank - Tests Automatises

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Execution quotidienne a 00h00 heure de Paris (23h00 UTC la veille)
    - cron: '0 23 * * 0-4'
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Exécution des tests
  # ═══════════════════════════════════════════════════════════════
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build images Docker
        run: docker compose build --parallel

      - name: Run Chromium Mobile
        run: docker compose run --rm tests-chromium-mobile

      - name: Run Webkit Mobile
        run: docker compose run --rm tests-webkit-mobile

      - name: Run Chromium Desktop
        run: docker compose run --rm tests-chromium-desktop

      - name: Run Webkit Desktop
        run: docker compose run --rm tests-webkit-desktop

      - name: Run Firefox Desktop
        run: docker compose run --rm tests-firefox-desktop

      - name: Run Chromium Tablet
        run: docker compose run --rm tests-chromium-tablet

      - name: Run Webkit Tablet
        run: docker compose run --rm tests-webkit-tablet

      - name: Run Firefox Mobile
        run: docker compose run --rm tests-firefox-mobile

      - name: Run Firefox Tablet
        run: docker compose run --rm tests-firefox-tablet

      - name: Check exit codes
        if: always()
        run: |
          for CID in $(docker compose ps -aq); do
            EXIT_CODE=$(docker inspect $CID --format='{{.State.ExitCode}}')
            NAME=$(docker inspect $CID --format='{{.Name}}')
            echo "$NAME -> $EXIT_CODE"
            if [ "$EXIT_CODE" != "0" ]; then
              FAIL=1
            fi
          done

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tests-reports
          path: digitalbank-automation/reports
          retention-days: 30

      - name: Stop containers
        if: always()
        run: docker compose down -v

  # ═══════════════════════════════════════════════════════════════
  # Publication des résultats
  # ═══════════════════════════════════════════════════════════════
  publish-results:
    runs-on: ubuntu-latest
    needs: tests
    if: always()

    steps:
      - name: Publish PR summary
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ needs.tests.result }}';

            const icon = (s) =>
              s === 'success' ? '✅' :
              s === 'failure' ? '❌' : '⚠️';

            const body = `
            ## 📊 Résultats des Tests DigitalBank

            | Suite | Statut |
            |--------|--------|
            | Tests Globaux | ${icon(result)} ${result} |

            📁 Les rapports sont disponibles dans les **Artifacts** du workflow.

            🤖 _CI/CD DigitalBank_
            `;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
