name: DigitalBank - Tests Automatises

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Execution quotidienne a 00h00 heure de Paris (23h00 UTC la veille)
    - cron: '0 23 * * 0-4'
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Dispatcher : détermine quels jobs exécuter selon le contexte
  # ═══════════════════════════════════════════════════════════════
  dispatcher:
    runs-on: ubuntu-latest
    outputs:
      run-smoke:       ${{ steps.dispatch.outputs.run-smoke }}
      run-regression:  ${{ steps.dispatch.outputs.run-regression }}
      run-accessibility: ${{ steps.dispatch.outputs.run-accessibility }}
      run-publish:     ${{ steps.dispatch.outputs.run-publish }}
    steps:
      - name: Determine jobs to run
        id: dispatch
        run: |
          EVENT="${{ github.event_name }}"
          echo "Event: $EVENT"

          # Smoke : toujours
          echo "run-smoke=true" >> $GITHUB_OUTPUT

          # Regression + Accessibility + Publish : PR, schedule, manuel, ou push sur main
          if [[ "$EVENT" == "pull_request" || "$EVENT" == "schedule" || "$EVENT" == "workflow_dispatch" || "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "run-regression=true"    >> $GITHUB_OUTPUT
            echo "run-accessibility=true" >> $GITHUB_OUTPUT
            echo "run-publish=true"       >> $GITHUB_OUTPUT
          else
            echo "run-regression=false"    >> $GITHUB_OUTPUT
            echo "run-accessibility=false" >> $GITHUB_OUTPUT
            echo "run-publish=false"       >> $GITHUB_OUTPUT
          fi

  # ═══════════════════════════════════════════════════════════════
  # Job 1 — Smoke tests (bloquants)
  # ═══════════════════════════════════════════════════════════════
  tests-smoke:
    needs: dispatcher
    if: needs.dispatcher.outputs.run-smoke == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build images Docker
        run: docker compose build --parallel

      - name: Run Chromium Mobile
        run: docker compose run -e PYTEST_MARKERS="smoke" tests-chromium-mobile

      - name: Check exit codes
        if: always()
        run: |
          FAIL=0
          for CID in $(docker compose ps -aq); do
            EXIT_CODE=$(docker inspect $CID --format='{{.State.ExitCode}}')
            NAME=$(docker inspect $CID --format='{{.Name}}')
            echo "$NAME -> $EXIT_CODE"
            if [ "$EXIT_CODE" != "0" ]; then
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-tests-smoke
          path: digitalbank-automation/reports
          retention-days: 30

      - name: Stop containers
        if: always()
        run: docker compose down -v

  # ═══════════════════════════════════════════════════════════════
  # Job 2 — Regression tests (parallelisés, après smoke)
  # ═══════════════════════════════════════════════════════════════
  tests-regression:
    needs: [dispatcher, tests-smoke]
    if: needs.dispatcher.outputs.run-regression == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build images Docker
        run: docker compose build --parallel

      - name: Run Firefox Desktop
        run: docker compose run tests-firefox-desktop

      - name: Run Webkit Tablet
        run: docker compose run tests-webkit-tablet

      - name: Run Chromium Desktop
        run: docker compose run tests-chromium-desktop

      - name: Run Webkit Mobile
        run: docker compose run tests-webkit-mobile

      - name: Run Webkit Desktop
        run: docker compose run tests-webkit-desktop

      - name: Run Chromium Tablet
        run: docker compose run tests-chromium-tablet

      - name: Run Firefox Mobile
        run: docker compose run tests-firefox-mobile

      - name: Run Firefox Tablet
        run: docker compose run tests-firefox-tablet

      - name: Check exit codes
        if: always()
        run: |
          FAIL=0
          for CID in $(docker compose ps -aq); do
            EXIT_CODE=$(docker inspect $CID --format='{{.State.ExitCode}}')
            NAME=$(docker inspect $CID --format='{{.Name}}')
            echo "$NAME -> $EXIT_CODE"
            if [ "$EXIT_CODE" != "0" ]; then
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-tests-regression
          path: digitalbank-automation/reports
          retention-days: 30

      - name: Stop containers
        if: always()
        run: docker compose down -v

  # ═══════════════════════════════════════════════════════════════
  # Job 3 — Accessibility tests (en parallèle de regression)
  # ═══════════════════════════════════════════════════════════════
  tests-accessibility:
    needs: [dispatcher, tests-smoke]
    if: needs.dispatcher.outputs.run-accessibility == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build images Docker
        run: docker compose build --parallel

      - name: Run accessibility tests
        run: docker compose run -e PYTEST_MARKERS="accessibility" tests-chromium-desktop

      - name: Check exit codes
        if: always()
        run: |
          FAIL=0
          for CID in $(docker compose ps -aq); do
            EXIT_CODE=$(docker inspect $CID --format='{{.State.ExitCode}}')
            NAME=$(docker inspect $CID --format='{{.Name}}')
            echo "$NAME -> $EXIT_CODE"
            if [ "$EXIT_CODE" != "0" ]; then
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-tests-accessibility
          path: digitalbank-automation/reports
          retention-days: 30

      - name: Stop containers
        if: always()
        run: docker compose down -v

  # ═══════════════════════════════════════════════════════════════
  # Job 4 — Publish results (commentaire automatique sur les PR)
  # ═══════════════════════════════════════════════════════════════
  publish-results:
    needs: [dispatcher, tests-regression, tests-accessibility]
    if: always() && needs.dispatcher.outputs.run-publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Post PR comment with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const regression   = '${{ needs.tests-regression.result }}';
            const accessibility = '${{ needs.tests-accessibility.result }}';
            const icon = (r) => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';

            const body = [
              '## Résultats des tests automatisés',
              '',
              `| Job               | Statut              |`,
              `|-------------------|---------------------|`,
              `| Smoke             | ✅ (bloquant passé) |`,
              `| Regression        | ${icon(regression)} ${regression}    |`,
              `| Accessibility     | ${icon(accessibility)} ${accessibility} |`,
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
